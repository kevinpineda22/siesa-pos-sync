name: Sync POS -> Siesa (cada 2h)

# Ejecuta el flujo CNZ->CFZ de las facturas de HOY (zona America/Bogota) para el CO/Caja
# configurados. Corre DENTRO del runner de GitHub Actions (node directo), no vía Vercel,
# para no chocar con el límite de ejecución serverless.

on:
  schedule:
    # Cada 2 horas. OJO: el cron de GitHub es en UTC y puede retrasarse minutos bajo carga.
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      co:
        description: 'CO(s) a sincronizar (ej. 001 o 001,003). Vacío = usa el default.'
        required: false
        default: ''
      caja:
        description: 'Caja(s)/tipo docto (ej. P05 o P01,P03,P05). Vacío = usa el default.'
        required: false
        default: ''
      limite:
        description: 'PRUEBA: procesar solo N facturas (vacío = todas las del día).'
        required: false
        default: ''
      solo_hoy:
        description: 'Filtrar solo facturas de HOY (en pruebas pon false si hoy no hay).'
        required: false
        type: choice
        options: ['true', 'false']
        default: 'true'

# Evita que dos corridas se solapen (no cancela la que está en curso).
concurrency:
  group: sync-pos
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node >= 22 es REQUERIDO: @supabase/supabase-js necesita WebSocket nativo
          # (Node 20 crashea con "Node.js 20 detected without native WebSocket support").
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar sincronización
        run: node scripts/runSyncCron.js
        env:
          # --- Credenciales / conexión (GitHub Secrets) ---
          CONNI_KEY: ${{ secrets.CONNI_KEY }}
          CONNI_TOKEN: ${{ secrets.CONNI_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # --- Configuración del flujo ---
          CIA: ${{ secrets.CIA }}
          ENTORNO_SIESA: ${{ secrets.ENTORNO_SIESA }}
          CONCURRENCIA: ${{ secrets.CONCURRENCIA }}
          PAGINACION_CONCURRENCIA: ${{ secrets.PAGINACION_CONCURRENCIA }}
          MAX_RONDAS_AJUSTE: ${{ secrets.MAX_RONDAS_AJUSTE }}
          # --- Filtros CO/Caja: input manual del dispatch tiene prioridad; si no, default ---
          CO_FILTER: ${{ github.event.inputs.co || '001' }}
          CAJA_FILTER: ${{ github.event.inputs.caja || 'P01,P03,P05' }}
          # --- Modo prueba (solo aplica en "Run workflow"; el cron los deja vacíos = producción) ---
          CRON_LIMITE: ${{ github.event.inputs.limite || '' }}
          CRON_SOLO_HOY: ${{ github.event.inputs.solo_hoy || 'true' }}
          # NOTA: el cron NO envía reporte por correo. Si se quisiera, agregar aquí las SMTP_*.
